<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 통합 리스크 검수기 (OCR 지원)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Mammoth.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        .prose th, .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
            word-break: keep-all;
        }
        .prose th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #progress-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 9999px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        #progress-bar {
            background-color: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-5xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <header class="mb-10 text-center">
            <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">통합 리스크 검수기 (OCR 지원)</h1>
            <p class="text-slate-600">준법감시 및 PR 리스크 자동 점검 시스템</p>
        </header>

        <main class="bg-white rounded-2xl shadow-xl p-6 sm:p-10 border border-slate-100">
            <!-- API Key Input -->
            <div class="mb-8 p-4 bg-amber-50 border border-amber-200 rounded-xl">
                <label for="api-key" class="block text-sm font-bold text-amber-800 mb-2">Google Gemini API Key 입력</label>
                <input type="password" id="api-key" class="w-full p-3 border border-amber-300 rounded-lg shadow-sm focus:ring-2 focus:ring-amber-500" placeholder="AI Studio에서 발급받은 API 키를 입력하세요.">
                <p class="text-xs text-amber-600 mt-2">입력하신 API 키는 브라우저 내에서만 사용되며 서버로 전송되지 않습니다.</p>
            </div>

            <!-- File Upload Section -->
            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-3">1. 검수할 파일 업로드 (문서 및 이미지)</label>
                <div id="dropzone" class="mt-1 flex justify-center px-6 pt-8 pb-8 border-2 border-slate-300 border-dashed rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all duration-200 cursor-pointer bg-slate-50" onclick="document.getElementById('file-upload').click()">
                    <div class="space-y-2 text-center">
                        <svg class="mx-auto h-14 w-14 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-slate-600 justify-center items-center">
                            <span class="relative cursor-pointer bg-transparent rounded-md font-bold text-blue-600 hover:text-blue-500">
                                <span>파일 선택하기</span>
                                <input id="file-upload" name="file-upload" type="file" class="sr-only" accept=".pdf,.docx,.txt,.jpg,.jpeg,.png">
                            </span>
                            <p class="pl-2">또는 여기로 드래그 앤 드롭</p>
                        </div>
                    </div>
                </div>
                
                <div id="status-area" class="hidden mt-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <p id="file-name" class="text-sm font-bold text-blue-900 truncate"></p>
                </div>
            </div>

            <!-- Extracted Text -->
            <div class="mb-8">
                <label for="extracted-text" class="block text-sm font-bold text-slate-700 mb-3">2. 추출된 텍스트 확인</label>
                <textarea id="extracted-text" rows="8" class="shadow-inner block w-full border-slate-300 rounded-xl p-4 bg-slate-50" placeholder="파일을 업로드하면 텍스트가 표시됩니다."></textarea>
            </div>

            <div class="flex justify-center mb-10">
                <button id="analyze-btn" class="px-8 py-4 text-lg font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 w-full sm:w-auto">
                    AI 리스크 정밀 검수 시작
                </button>
            </div>

            <div id="loading" class="hidden flex flex-col items-center py-8"><div class="loader mb-4"></div><p>분석 중입니다...</p></div>
            <div id="error-message" class="hidden mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-md text-red-700"></div>
            <div id="result-section" class="hidden">
                <div id="result-content" class="prose max-w-none text-sm text-slate-800 bg-white p-6 rounded-xl border border-slate-200 shadow-sm"></div>
            </div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        // 요소 선택
        const apiKeyInput = document.getElementById('api-key');
        const fileUpload = document.getElementById('file-upload');
        const extractedText = document.getElementById('extracted-text');
        const analyzeBtn = document.getElementById('analyze-btn');
        const loadingSection = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const errorMessage = document.getElementById('error-message');

        // 파일 처리 로직 (이전과 동일)
        fileUpload.addEventListener('change', async (e) => {
            if (e.target.files.length > 0) {
                // ... 생략: handleFile 로직 구현부
            }
        });

        // AI 분석 실행
        analyzeBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                errorMessage.textContent = "API 키를 먼저 입력해주세요.";
                errorMessage.classList.remove('hidden');
                return;
            }

            const textToAnalyze = extractedText.value.trim();
            if (!textToAnalyze) {
                errorMessage.textContent = "분석할 텍스트가 없습니다.";
                errorMessage.classList.remove('hidden');
                return;
            }

            errorMessage.classList.add('hidden');
            analyzeBtn.disabled = true;
            loadingSection.classList.remove('hidden');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const systemPrompt = "당신은 20년 경력의 보험 준법감시인입니다. 제시된 광고 텍스트의 리스크(편향성, 금소법 위반 등)를 마크다운 표로 분석하세요.";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: textToAnalyze }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                resultContent.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
                resultSection.classList.remove('hidden');
            } catch (error) {
                errorMessage.textContent = "오류 발생: " + error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                analyzeBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
