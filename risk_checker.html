<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 통합 리스크 검수기 (OCR 지원)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Mammoth.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        .prose th, .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
            word-break: keep-all;
        }
        .prose th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #1e293b;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #progress-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 9999px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        #progress-bar {
            background-color: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div class="max-w-5xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <header class="mb-10 text-center">
            <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                <svg class="w-8 h-8 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">통합 리스크 검수기 (OCR 지원)</h1>
            <p class="text-slate-600">준법감시 및 PR 리스크(편향성, 논란, 금소법 위반) 자동 점검 시스템</p>
        </header>

        <main class="bg-white rounded-2xl shadow-xl p-6 sm:p-10 border border-slate-100">
            <!-- File Upload Section -->
            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-3">1. 검수할 파일 업로드 (문서 및 이미지)</label>
                <div id="dropzone" class="mt-1 flex justify-center px-6 pt-8 pb-8 border-2 border-slate-300 border-dashed rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all duration-200 cursor-pointer bg-slate-50" onclick="document.getElementById('file-upload').click()">
                    <div class="space-y-2 text-center">
                        <svg class="mx-auto h-14 w-14 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-slate-600 justify-center items-center">
                            <span class="relative cursor-pointer bg-transparent rounded-md font-bold text-blue-600 hover:text-blue-500">
                                <span>파일 선택하기</span>
                                <input id="file-upload" name="file-upload" type="file" class="sr-only" accept=".pdf,.docx,.txt,.jpg,.jpeg,.png">
                            </span>
                            <p class="pl-2">또는 여기로 드래그 앤 드롭</p>
                        </div>
                        <p class="text-xs text-slate-500 font-medium">지원 형식: PDF, DOCX, TXT, JPG, PNG</p>
                    </div>
                </div>
                
                <div id="status-area" class="hidden mt-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <div class="flex items-center justify-between mb-1">
                        <p id="file-name" class="text-sm font-bold text-blue-900 truncate max-w-[70%]"></p>
                        <p id="extraction-status" class="text-xs font-semibold text-blue-700"></p>
                    </div>
                    <div id="progress-container" class="hidden">
                        <div id="progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Extracted Text Section -->
            <div class="mb-8">
                <label for="extracted-text" class="block text-sm font-bold text-slate-700 mb-3 flex justify-between items-end">
                    <span>2. 추출된 텍스트 확인</span>
                    <span class="text-xs font-normal text-slate-500">※ 직접 텍스트를 입력하거나 수정해도 됩니다.</span>
                </label>
                <textarea id="extracted-text" rows="8" class="shadow-inner focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-slate-300 rounded-xl p-4 bg-slate-50 text-slate-700 leading-relaxed" placeholder="파일을 업로드하면 텍스트가 이곳에 추출됩니다. (이미지 파일은 약 10~20초 소요)"></textarea>
            </div>

            <!-- Action Button -->
            <div class="flex justify-center mb-10">
                <button id="analyze-btn" class="inline-flex items-center justify-center px-8 py-4 border border-transparent text-lg font-bold rounded-xl shadow-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors w-full sm:w-auto">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    AI 리스크 정밀 검수 시작
                </button>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="hidden flex flex-col items-center justify-center mb-10 py-8 bg-slate-50 rounded-xl border border-slate-200">
                <div class="loader mb-4"></div>
                <p class="text-sm text-slate-700 font-bold">20년 경력의 AI 준법감시인이 문맥을 꼼꼼히 분석하고 있습니다...</p>
                <p class="text-xs text-slate-500 mt-2">최대 20~30초 정도 소요될 수 있습니다.</p>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-md">
                <div class="flex">
                    <div class="ml-3">
                        <p class="text-sm text-red-700 font-medium" id="error-text"></p>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div id="result-section" class="hidden">
                <div class="flex items-center mb-6 pb-4 border-b border-slate-200">
                    <span class="text-2xl mr-2">💡</span>
                    <h2 class="text-xl font-bold text-slate-900">검수 결과 리포트</h2>
                </div>
                <div id="result-content" class="prose max-w-none text-sm text-slate-800 bg-white p-6 rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
                </div>
            </div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileUpload = document.getElementById('file-upload');
        const dropzone = document.getElementById('dropzone');
        const statusArea = document.getElementById('status-area');
        const fileNameDisplay = document.getElementById('file-name');
        const extractionStatus = document.getElementById('extraction-status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const extractedText = document.getElementById('extracted-text');
        const analyzeBtn = document.getElementById('analyze-btn');
        const loadingSection = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        ['dragover', 'dragenter'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-100'); });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => { e.preventDefault(); dropzone.classList.remove('border-blue-500', 'bg-blue-100'); });
        });

        dropzone.addEventListener('drop', (e) => {
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        fileUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            fileNameDisplay.textContent = file.name;
            statusArea.classList.remove('hidden');
            progressContainer.classList.add('hidden');
            extractedText.value = "";
            analyzeBtn.disabled = true;
            errorMessage.classList.add('hidden');
            resultSection.classList.add('hidden');

            const fileExtension = file.name.split('.').pop().toLowerCase();

            try {
                let text = "";
                
                if (['jpg', 'jpeg', 'png'].includes(fileExtension)) {
                    text = await performOCR(file);
                } else if (fileExtension === 'txt') {
                    extractionStatus.textContent = "텍스트 파일 읽는 중...";
                    text = await readTextFile(file);
                } else if (fileExtension === 'pdf') {
                    extractionStatus.textContent = "PDF 텍스트 추출 중...";
                    text = await readPdfFile(file);
                    
                    // 추출된 일반 텍스트가 50자 미만이면 스캔본으로 간주하고 자동으로 OCR 실행
                    if (!text || text.trim().length < 50) {
                        extractionStatus.textContent = "스캔된 PDF 감지됨. 자체 이미지 변환 후 OCR 정밀 분석으로 전환합니다...";
                        text = await performPdfOCR(file);
                    }
                } else if (fileExtension === 'docx') {
                    extractionStatus.textContent = "Word 문서 추출 중...";
                    text = await readDocxFile(file);
                } else {
                    throw new Error("지원하지 않는 파일 형식입니다.");
                }

                extractedText.value = text;
                extractionStatus.textContent = "추출 완료!";
                extractionStatus.classList.replace('text-blue-700', 'text-green-600');
            } catch (error) {
                extractionStatus.textContent = "추출 실패";
                extractionStatus.classList.replace('text-blue-700', 'text-red-600');
                errorText.textContent = `추출 오류: ${error.message}`;
                errorMessage.classList.remove('hidden');
            } finally {
                analyzeBtn.disabled = false;
            }
        }

        async function performOCR(file) {
            progressContainer.classList.remove('hidden');
            extractionStatus.textContent = "AI 비전(OCR) 분석 시작...";
            progressBar.style.width = '0%';
            
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const worker = await Tesseract.createWorker('kor+eng', 1, {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    const progress = Math.round(m.progress * 100);
                                    progressBar.style.width = `${progress}%`;
                                    extractionStatus.textContent = `이미지 글자 인식 중... (${progress}%)`;
                                }
                            }
                        });
                        const ret = await worker.recognize(e.target.result);
                        await worker.terminate();
                        resolve(ret.data.text);
                    } catch (err) {
                        reject(new Error("OCR 처리 중 문제가 발생했습니다."));
                    }
                };
                reader.onerror = () => reject(new Error("파일을 읽을 수 없습니다."));
                reader.readAsDataURL(file);
            });
        }

        // 새롭게 추가된 기능: 스캔된 PDF를 브라우저 내부에서 이미지로 변환하여 OCR 추출
        async function performPdfOCR(file) {
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            let currentPage = 1;
            const totalPages = pdf.numPages;

            const worker = await Tesseract.createWorker('kor+eng', 1, {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const pageProgress = m.progress * 100;
                        // 전체 페이지 진행률 계산
                        const overallProgress = ((currentPage - 1) * 100 + pageProgress) / totalPages;
                        progressBar.style.width = `${overallProgress}%`;
                        extractionStatus.textContent = `PDF 스캔본 OCR 분석 중... (페이지 ${currentPage}/${totalPages}, ${Math.round(overallProgress)}%)`;
                    }
                }
            });

            for (let i = 1; i <= totalPages; i++) {
                currentPage = i;
                extractionStatus.textContent = `PDF 페이지 ${i}/${totalPages} 고해상도 변환 중...`;

                const page = await pdf.getPage(i);
                // OCR 인식률을 높이기 위해 PDF 화면 비율을 2배로 확대하여 캡처
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // 생성된 가상 캔버스를 이미지(Base64) 데이터로 변환 후 OCR 엔진에 전달
                const imageDataUrl = canvas.toDataURL('image/png');
                const ret = await worker.recognize(imageDataUrl);
                
                fullText += `\n--- 페이지 ${i} ---\n` + ret.data.text + "\n";
            }

            await worker.terminate();
            return fullText.trim();
        }

        function readTextFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsText(file);
            });
        }

        async function readPdfFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(' ') + "\n\n";
            }
            return fullText;
        }

        async function readDocxFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            return result.value;
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            const textToAnalyze = extractedText.value.trim();
            if (!textToAnalyze) {
                errorText.textContent = "분석할 텍스트가 없습니다.";
                errorMessage.classList.remove('hidden');
                return;
            }

            errorMessage.classList.add('hidden');
            analyzeBtn.disabled = true;
            loadingSection.classList.remove('hidden');
            resultSection.classList.add('hidden');

            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const systemPrompt = `너는 20년 경력의 보험회사 준법감시인이자 트렌드에 민감한 PR 리스크 관리자야. 
다음 텍스트(OCR을 통해 추출된 데이터일 수 있으므로 오타나 맥락 끊김을 감안하여 분석해)에서 
1) 특정 성별/세대/국가/직업에 대한 편향적 표현이나 차별적 뉘앙스
2) 최근의 정치/사회적 논란, 젠더 갈등 등과 연결될 수 있는 단어
3) 금융소비자보호법 위반 소지가 있는 과장광고(예: '무조건', '최고', '전액 보장', '절대' 등의 남용이나 단정적 표현)
를 찾아내 줘.

결과는 반드시 아래 항목을 포함하여 Markdown 표(Table) 형태로 깔끔하게 정리해 줘.
- 리스크 분류 (편향성 / 사회적 논란 / 금소법 위반)
- 문제가 된 원문 문장
- 문제의 이유 (왜 리스크가 되는지 상세히)
- 대체할 수 있는 순화된 권장 문장

만약 문제가 없다면 "🎉 현재 텍스트에서는 특별한 컴플라이언스 및 PR 리스크 요소가 발견되지 않았습니다."라고 답변해 줘.`;

            const payload = {
                contents: [{ parts: [{ text: textToAnalyze }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const generatedText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (generatedText) {
                    resultContent.innerHTML = marked.parse(generatedText);
                    resultSection.classList.remove('hidden');
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    throw new Error("AI로부터 올바른 응답을 받지 못했습니다.");
                }
            } catch (error) {
                errorText.textContent = "검수 중 오류가 발생했습니다. (상세: " + error.message + ")";
                errorMessage.classList.remove('hidden');
            } finally {
                analyzeBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
